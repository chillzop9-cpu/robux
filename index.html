<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robux Rewards</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #22c55e;
    --green-dark: #16a34a;
    --green-light: #4ade80;
    --bg: #0f0f0f;
    --card: #ffffff;
    --text-dark: #1a1a1a;
    --text-muted: #555;
    --radius: 20px;
    --shadow: 0 8px 40px rgba(0,0,0,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    background:url('bg.jpeg');  center/cover no-repeat fixed;
  }

  /* ── BACKGROUND MOSAIC ── */
  .bg-mosaic {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    padding: 6px;
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
    transform: rotate(-3deg) scale(1.08);
  }
  .bg-tile {
    border-radius: 10px;
    background-size: cover;
    background-position: center;
    animation: tileFloat 8s ease-in-out infinite;
  }
  .bg-tile:nth-child(odd)  { animation-delay: -3s; }
  .bg-tile:nth-child(3n)   { animation-delay: -6s; }
  @keyframes tileFloat {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-6px); }
  }
  /* Coloured placeholder tiles (like Roblox game thumbnails) */
  .t1  { background: linear-gradient(135deg,#1e3a5f,#2563eb); }
  .t2  { background: linear-gradient(135deg,#7c2d12,#ea580c); }
  .t3  { background: linear-gradient(135deg,#14532d,#22c55e); }
  .t4  { background: linear-gradient(135deg,#4a1d96,#8b5cf6); }
  .t5  { background: linear-gradient(135deg,#1e1b4b,#6366f1); }
  .t6  { background: linear-gradient(135deg,#831843,#ec4899); }
  .t7  { background: linear-gradient(135deg,#78350f,#f59e0b); }
  .t8  { background: linear-gradient(135deg,#052e16,#10b981); }
  .t9  { background: linear-gradient(135deg,#1e40af,#38bdf8); }
  .t10 { background: linear-gradient(135deg,#450a0a,#dc2626); }
  .t11 { background: linear-gradient(135deg,#0c4a6e,#0ea5e9); }
  .t12 { background: linear-gradient(135deg,#1a1a2e,#e94560); }
  .t13 { background: linear-gradient(135deg,#3b0764,#c084fc); }
  .t14 { background: linear-gradient(135deg,#064e3b,#34d399); }
  .t15 { background: linear-gradient(135deg,#1c1917,#a16207); }
  .t16 { background: linear-gradient(135deg,#312e81,#818cf8); }
  .t17 { background: linear-gradient(135deg,#0f172a,#38bdf8); }
  .t18 { background: linear-gradient(135deg,#422006,#fb923c); }
  .t19 { background: linear-gradient(135deg,#1a1a1a,#22d3ee); }
  .t20 { background: linear-gradient(135deg,#270f42,#f472b6); }
  .t21 { background: linear-gradient(135deg,#0d2341,#60a5fa); }
  .t22 { background: linear-gradient(135deg,#1d1020,#a855f7); }
  .t23 { background: linear-gradient(135deg,#0a2110,#4ade80); }
  .t24 { background: linear-gradient(135deg,#1e0a14,#fb7185); }

  /* add labels to tiles */
  .bg-tile::after {
    content: attr(data-label);
    display: flex; align-items: flex-end; justify-content: flex-start;
    height: 100%; padding: 8px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 11px;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase; letter-spacing: .5px;
  }

  /* ── LAYOUT ── */
  .page-wrap {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 16px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%; max-width: 500px;
    padding: 48px 52px 44px;
    display: flex; flex-direction: column; align-items: center; gap: 0;
    animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(28px) scale(.97); }
    to   { opacity:1; transform: translateY(0)   scale(1); }
  }

  /* game icon */
  .game-icon {
    width: 110px; height: 110px;
    border-radius: 24px;
    overflow: hidden;
    margin-top: -80px;
    border: 4px solid #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    background:url('logo.png');
    background-size: 120px 120px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 34px;
    color: var(--text-dark);
    margin: 20px 0 22px;
    text-align: center;
  }

  /* username row */
  .username-row {
    display: flex; gap: 8px;
    width: 100%; margin-bottom: 14px;
  }
  .username-input {
    flex: 1;
    border: 1.5px solid #d1d5db;
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    outline: none;
    transition: border-color .2s;
  }
  .username-input::placeholder { color: #aaa; }
  .username-input:focus { border-color: var(--green); }
  .btn-next {
    background: var(--text-dark);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 14px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    white-space: nowrap;
  }
  .btn-next:hover { background: #333; }
  .btn-next:active { transform: scale(.97); }

  .subtitle {
    font-size: 23px; color: var(--text-muted);
    font-family: 'poppins', sans-serif;
    margin-bottom: 18px; text-align: center;
  }
  .subtitle strong { color: var(--text-dark); font-weight: 800; }

  /* reward buttons */
  .rewards { display: flex; flex-direction: column; gap: 10px; width: 100%; }

  .reward-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 10px 24px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 18px;
    cursor: pointer;
    align-items: center; justify-content: space-between;
    transition: filter .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 14px rgba(34,197,94,.3);
    animation: btnIn .4s cubic-bezier(.22,1,.36,1) both;
  }
  .reward-btn:nth-child(1) { animation-delay: .05s; }
  .reward-btn:nth-child(2) { animation-delay: .10s; }
  .reward-btn:nth-child(3) { animation-delay: .15s; }
  .reward-btn:nth-child(4) { animation-delay: .20s; }
  @keyframes btnIn {
    from { opacity:0; transform: translateX(-12px); }
    to   { opacity:1; transform: translateX(0); }
  }
  .reward-btn:hover {
    filter: brightness(1.08);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(34,197,94,.45);
  }
  .reward-btn:active { transform: scale(.98); }
  .reward-btn .coin-icon { font-size: 20px; }
  .reward-btn .amount {
    font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,.2);
    padding: 3px 10px; border-radius: 20px;
  }

  /* step indicators */
  .steps {
    display: flex; gap: 6px;
    margin-top: 22px;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #d1d5db;
    transition: background .3s, transform .3s;
  }
  .step-dot.active { background: var(--green); transform: scale(1.3); }
</style>
</head>
<body>


<!-- CARD -->
<div class="page-wrap">
  <div class="card">

    <div class="game-icon"></div>

    <h1>Final Step</h1>

    <!-- Step 1: input -->
    <div class="username-row" id="inputRow">
      <input class="username-input" type="text" placeholder="Enter Username" id="usernameInput">
      <button class="btn-next" onclick="handleNext()">Next</button>
    </div>

    <!-- Step 2: display username -->
    <div id="usernameDisplay" style="display:none; text-align:center; margin-bottom:4px; animation: cardIn .35s cubic-bezier(.22,1,.36,1) both;">
      <p style="font-size:13px; color:var(--text-muted); margin-bottom:4px;">ROBLOX Username:</p>
      <p id="usernameTag" style="font-family:'Nunito',sans-serif; font-weight:900; font-size:26px; color:var(--text-dark);"></p>
    </div>

    <p class="subtitle">Complete the activities below to recieve you're <strong>Robux</strong></p>

    <div class="rewards">
      <button class="reward-btn" onclick="openReward('https://smrturl.co/a/s4d406189df/576?s1=')">
        <span>1st Offer</span>
      </button>
      <button class="reward-btn" onclick="openReward('https://smrturl.co/a/s4d406189df/18251?s1=')">
        <span>2nd Offer</span>
      </button>
      <button class="reward-btn" onclick="openReward('https://smrturl.co/a/s4d406189df/19818?s1=')">
        <span>3rd Offer</span>
      </button>
      <button class="reward-btn" onclick="openReward('https://smrturl.co/a/s4d406189df/20133?s1=')">
        
        <span>4th Offer</span>
      </button>
    </div>



  </div>
</div>

<script>
  let confirmedUsername = '';

  function handleNext() {
    const val = document.getElementById('usernameInput').value.trim();
    if (!val) {
      document.getElementById('usernameInput').style.borderColor = '#ef4444';
      setTimeout(() => document.getElementById('usernameInput').style.borderColor = '', 1200);
      return;
    }
    confirmedUsername = val;
    // hide input, show @username
    document.getElementById('inputRow').style.display = 'none';
    document.getElementById('usernameTag').textContent = '@' + val;
    document.getElementById('usernameDisplay').style.display = 'block';

  }

  // allow pressing Enter in input
  document.getElementById('usernameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleNext();
  });

  function openReward(url) {
    if (!confirmedUsername) {
      document.getElementById('usernameInput').focus();
      document.getElementById('usernameInput').style.borderColor = '#ef4444';
      setTimeout(() => document.getElementById('usernameInput').style.borderColor = '', 1200);
      return;
    }
    window.open(url, '_blank');
  }
</script>

</body>
</html>
